# Nexus - GLOBAL canonical concept catalog (jurisdiction-neutral)
#
# Reusable banking ontology. canonical_id is CPT_<SLUG>, stable forever.
# `parent` is another canonical_id (hierarchy) or null for a top family.
# `synonyms` are real free-text concept strings that resolve here.
# `status: approved` satisfies the Step-4 gate; `draft` flags for review.
# This file is DRAFT until a compliance expert signs off.

